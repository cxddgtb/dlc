# Clash Meta Configuration Template
# Generated by CXDDZY-Pro v2.0
# Enhanced with MOTV and strong proxy rules

port: 7890
socks-port: 7891
mixed-port: 7892
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
external-controller: 127.0.0.1:9090
secret: ""
ipv6: false

dns:
  enable: true
  listen: :1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - localhost.ptlogin2.qq.com
    - "+.srv.nintendo.net"
    - "+.stun.playstation.net"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "+.xboxlive.com"
    - "msftconnecttest.com"
    - "xbox.*.microsoft.com"
  nameserver:
    - 223.5.5.5
    - 114.114.114.114
    - tls://223.5.5.5:853
  fallback:
    - 8.8.8.8
    - 1.1.1.1
    - tls://8.8.8.8:853
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
    domain:
      - "+.google.com"
      - "+.facebook.com"
      - "+.youtube.com"

tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

profile:
  store-selected: true
  store-fake-ip: true

proxy-groups:
  - name: "🚀 节点选择"
    type: select
    proxies:
      - ♻️ 自动选择
      - 🔰 延迟最低
      - 🎯 负载均衡
      - ✅ 手动选择
      - 🗺️ 选择地区
      - DIRECT

  - name: "♻️ 自动选择"
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true
    proxies: []

  - name: "🔰 延迟最低"
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true
    proxies: []

  - name: "🎯 负载均衡"
    type: load-balance
    strategy: consistent-hashing
    url: http://www.gstatic.com/generate_204
    interval: 300
    lazy: true
    proxies: []

  - name: "✅ 手动选择"
    type: select
    proxies: []

  - name: "🗺️ 选择地区"
    type: select
    proxies: []

  - name: "🇭🇰 香港节点"
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true
    filter: "港|HK|Hong"
    proxies: []

  - name: "🇯🇵 日本节点"
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true
    filter: "日|JP|Japan"
    proxies: []

  - name: "🇺🇸 美国节点"
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true
    filter: "美|US|States"
    proxies: []

  - name: "🇸🇬 新加坡节点"
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true
    filter: "新|SG|Singapore"
    proxies: []

  - name: "🌐 突破锁区"
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择

  - name: "⛔ 广告拦截"
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: "🐟 漏网之鱼"
    type: select
    proxies:
      - 🚀 节点选择
      - DIRECT

