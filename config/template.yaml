# mihomo / Clash Meta 企业级配置模板
# 特性：零超时 | 多维分组 | 智能降级链 | 进程/域名/IP 三维分流 | 自动嗅探优化
mixed-port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true
find-process-mode: strict
keep-alive-idle: 600
keep-alive-interval: 30
interface-name: en0

# 协议嗅探优化（自动识别 SNI/HTTP/QUIC，解决污染与分流失效）
sniffer:
  enable: true
  sniff:
    HTTP: { ports: [80, 8080-8880], override-destination: true }
    TLS: { ports: [443, 8443], override-destination: true }
    QUIC: { ports: [443, 8443] }
  skip-domain:
    - "Mijia Cloud"
    - "dlg.io.mi.com"
    - "push.apple.com"

# DNS 防污染+智能解析
dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "time.*.com"
    - "ntp.*.com"
    - "+.push.apple.com"
    - "captive.apple.com"
  nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
    - https://dns.alidns.com/dns-query
  fallback:
    - https://9.9.9.9/dns-query
    - https://208.67.222.222/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/8
      - 127.0.0.0/8

# ================= 策略组架构 =================
proxy-groups:
  # 🚀 核心智能优选（全局自动测速，失败3次自动剔除）
  - name: 🚀 智能优选
    type: url-test
    proxies: []
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true
    max-failed-times: 3

  # 🌏 亚洲低延迟专线（港/台/新/日/韩，容忍30ms，适合日常/网页）
  - name: 🌏 亚洲低延迟
    type: url-test
    proxies: []
    url: http://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 30
    lazy: true
    max-failed-times: 3
    filter: "(?i)(hk|tw|sg|jp|kr|asia|港|台|新|日|韩)"

  # 🌍 欧美大带宽专线（美/德/法/荷/英，容忍80ms，适合下载/大流量）
  - name: 🌍 欧美大带宽
    type: url-test
    proxies: []
    url: http://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 80
    lazy: true
    max-failed-times: 3
    filter: "(?i)(us|de|fr|nl|uk|eu|美|德|法|荷|英|欧)"

  # 🎬 流媒体智能解锁链（降级：亚洲低延迟 → 欧美大带宽 → 智能优选 → 直连）
  - name: 🎬 流媒体解锁
    type: fallback
    proxies:
      - 🌏 亚洲低延迟
      - 🌍 欧美大带宽
      - 🚀 智能优选
      - DIRECT
    url: http://www.gstatic.com/generate_204
    interval: 300
    lazy: true

  # 🎮 游戏低延迟专线（严格延迟≤50ms，STUN探测，禁懒加载）
  - name: 🎮 游戏加速
    type: url-test
    proxies: []
    url: stun://stun.l.google.com:19302
    interval: 180
    tolerance: 20
    lazy: false
    max-failed-times: 2
    filter: "(?i)(game|low|latency|udp|专线|游戏|加速)"

  # 🤖 AI 与开发者（OpenAI/Claude/GitHub/AWS，优先美/日/新节点）
  - name: 🤖 AI 与开发者
    type: url-test
    proxies: []
    url: https://openai.com
    interval: 300
    tolerance: 100
    lazy: true
    max-failed-times: 3
    filter: "(?i)(us|jp|sg|ai|dev|open|claude|github)"

  # 📱 社交与通讯（自动优选，屏蔽国内干扰）
  - name: 📱 社交通讯
    type: url-test
    proxies: []
    url: https://www.google.com/generate_204
    interval: 300
    tolerance: 60
    lazy: true
    max-failed-times: 3
    filter: "(?i)(social|chat|msg|im|telegram|whatsapp|signal)"

  # 🌐 全局手动切换（兜底组，可临时强制指定节点）
  - name: 🌐 全局代理
    type: select
    proxies:
      - 🚀 智能优选
      - 🌏 亚洲低延迟
      - 🌍 欧美大带宽
      - 🎬 流媒体解锁
      - 🎮 游戏加速
      - 🤖 AI 与开发者
      - 📱 社交通讯
      - DIRECT

  # 🐟 漏网之鱼（最终兜底）
  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - DIRECT
      - 🚀 智能优选
      - 🌐 全局代理

