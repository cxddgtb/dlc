# Clash Configuration Template
# Generated by CXDDZY-Pro v2.0

port: 7890
socks-port: 7891
mixed-port: 7892
allow-lan: false
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

dns:
  enable: true
  listen: :1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 223.5.5.5
    - 114.114.114.114
  fallback:
    - 8.8.8.8
    - 1.1.1.1
  fallback-filter:
    geoip: true
    geoip-code: CN

proxy-groups:
  - name: "🚀 节点选择"
    type: select
    proxies:
      - ♻️ 自动选择
      - 🔰 延迟最低
      - ✅ 手动选择
      - 🗺️ 选择地区

  - name: "♻️ 自动选择"
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    proxies: []

  - name: "🔰 延迟最低"
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    proxies: []

  - name: "✅ 手动选择"
    type: select
    proxies: []

  - name: "🗺️ 选择地区"
    type: select
    proxies: []

  - name: "🌐 突破锁区"
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择

  - name: "⛔ 广告拦截"
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: "🐟 漏网之鱼"
    type: select
    proxies:
      - 🚀 节点选择
      - DIRECT

rules:
  # Ads blocking
  - DOMAIN-SUFFIX,admob.com,⛔ 广告拦截
  - DOMAIN-SUFFIX,adservice.google.com,⛔ 广告拦截

  # LAN
  - DOMAIN-KEYWORD,lan,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
  - IP-CIDR,192.168.0.0/16,DIRECT

  # China domains
  - GEOIP,CN,DIRECT

  # Final
  - MATCH,🐟 漏网之鱼
