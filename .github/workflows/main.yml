name: 🌐 Extreme Node Pipeline (No Timeout)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'sources.txt'
      - 'config/template.yaml'
      - 'scripts/core_engine.py'
      - '.github/workflows/main.yml'

permissions:
  contents: write
  actions: read

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: 🐍 Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install --no-cache-dir requests pyyaml

      - name: ⚙️ Set Environment Variables
        run: |
          echo "MAX_NODES=180" >> $GITHUB_ENV
          echo "MAX_LATENCY_MS=500" >> $GITHUB_ENV
          echo "CONCURRENCY=60" >> $GITHUB_ENV
          echo "ARCHIVE_KEEP=10" >> $GITHUB_ENV

      - name: 🕷️ Execute Core Engine
        run: python scripts/core_engine.py
        env:
          PYTHONUNBUFFERED: 1
          NO_TIMEOUT: true

      - name: ✅ Validate Generated YAML
        run: |
          python - << 'VALIDATOR'
          import yaml, sys, os
          try:
              path = 'output/final_config.yaml'
              if not os.path.exists(path):
                  print("❌ Output file missing")
                  sys.exit(1)
              with open(path, 'r', encoding='utf-8') as f:
                  cfg = yaml.safe_load(f)
              assert isinstance(cfg, dict), "Invalid YAML structure"
              assert 'proxies' in cfg and isinstance(cfg['proxies'], list), "Missing proxies"
              assert len(cfg['proxies']) > 0, "Empty proxies list"
              assert 'proxy-groups' in cfg, "Missing proxy-groups"
              assert 'rules' in cfg, "Missing rules"
              print("✅ YAML validation passed. Structure intact.")
          except Exception as e:
              print(f"❌ YAML validation failed: {e}")
              sys.exit(1)
          VALIDATOR

      - name: 💾 Commit Archive & Output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive/ output/
          if git diff-index --quiet HEAD --; then
            echo "ℹ️ No changes detected. Skip commit."
          else
            NODE_COUNT=$(python -c "import yaml; print(len(yaml.safe_load(open('output/final_config.yaml'))['proxies']))")
            git commit -m "🔄 Pipeline: $(date -u '+%Y-%m-%d %H:%M UTC') | Nodes: ${NODE_COUNT}"
            git push
            echo "✅ Committed & pushed successfully."
          fi
